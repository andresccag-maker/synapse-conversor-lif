name: Release

# Compila .dmg (macOS) y .exe (Windows) cuando se publica un tag `v*`, los
# sube a GitHub Releases. La landing de axiombio.tech/apps/lif-converter
# enlaza directamente a los artefactos de "latest".
#
# Para liberar v0.3.0:
#   git tag v0.3.0 && git push origin v0.3.0

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:

  build-macos:
    # Runner Intel (x86_64). El binario producido corre en Intel nativo y en
    # Apple Silicon vía Rosetta 2 — cobertura máxima sin matrix multi-arch.
    # Pillow >=11 no publica wheels universal2, así que --target-arch universal2
    # falla (binarios PIL no son fat). Cuando importe nativo en AS, añadir un
    # job paralelo en macos-14 con suffix -arm64.
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Generate icon assets (consistente con job Windows)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python assets/generate_icon.py

      - name: Build .app + .dmg (Intel x86_64 — corre en AS vía Rosetta)
        run: bash build_macos.sh

      - name: Locate DMG
        id: find_dmg
        run: |
          dmg=$(ls dist/*.dmg 2>/dev/null | head -1)
          if [ -z "$dmg" ]; then
            echo "::error::No DMG generated in dist/ — create-dmg failed silently?"
            ls -la dist/
            exit 1
          fi
          echo "path=$dmg" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$dmg")" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ steps.find_dmg.outputs.path }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Generate icon assets
        run: |
          python -m pip install -r requirements.txt
          python assets/generate_icon.py

      - name: Build installer
        shell: pwsh
        run: ./build_windows.ps1

      - name: Locate installer
        id: find_exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\SYN-APSE-Conversor-LIF-Setup-*.exe | Select-Object -First 1
          "path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$($exe.Name)"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: ${{ steps.find_exe.outputs.path }}

  publish:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*.exe
