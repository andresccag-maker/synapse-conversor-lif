name: Release

# Compila .dmg (macOS arm64 + macOS x86_64) y .exe (Windows) cuando se
# publica un tag `v*`, los sube a GitHub Releases. La landing de
# axiombio.tech/apps/lif-converter enlaza directamente a los artefactos
# de "latest".
#
# Diseño desacoplado:
#   - build-macos-arm64 + build-windows: rápidos, siempre disponibles.
#     publish-fast publica la Release con esos dos artefactos en cuanto
#     terminan (no espera al runner Intel saturado).
#   - build-macos-intel (macos-13): puede tardar 30-60 min en cola por
#     la deprecación de los runners Intel. Cuando termine, publish-intel
#     adjunta el .dmg Intel al MISMO Release (action-gh-release@v2 hace
#     upsert por tag). Si falla / se cancela, el Release queda con AS +
#     Windows y la página oculta el botón Intel automáticamente.
#
# Para liberar v0.X.Y:
#   git tag v0.X.Y && git push origin v0.X.Y

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install create-dmg
        run: brew install create-dmg
      - name: Generate icon assets
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python assets/generate_icon.py
      - name: Build .app + .dmg (arm64)
        env:
          ARCH_SUFFIX: arm64
        run: bash build_macos.sh
      - name: Locate DMG
        id: find_dmg
        run: |
          dmg=$(ls dist/*.dmg 2>/dev/null | head -1)
          if [ -z "$dmg" ]; then
            echo "::error::No DMG generated in dist/"
            ls -la dist/
            exit 1
          fi
          echo "path=$dmg" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-arm64
          path: ${{ steps.find_dmg.outputs.path }}

  build-macos-intel:
    # Runner Intel saturado por la deprecación de macos-13 — puede
    # tardar 30-60 min en arrancar. Sin fail-fast cross-job: este se
    # publica por separado.
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install create-dmg
        run: brew install create-dmg
      - name: Generate icon assets
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python assets/generate_icon.py
      - name: Build .app + .dmg (x86_64)
        env:
          ARCH_SUFFIX: x86_64
        run: bash build_macos.sh
      - name: Locate DMG
        id: find_dmg
        run: |
          dmg=$(ls dist/*.dmg 2>/dev/null | head -1)
          if [ -z "$dmg" ]; then
            echo "::error::No DMG generated in dist/"
            ls -la dist/
            exit 1
          fi
          echo "path=$dmg" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-x86_64
          path: ${{ steps.find_dmg.outputs.path }}

  build-linux-x86_64:
    # Ubuntu 22.04 (GLIBC 2.35), NO 24.04: los AppImage son compatibles hacia
    # adelante, no hacia atrás. Compilar en 22.04 → corre en 22.04 y posteriores
    # (cubre la Jetson y la mayoría de equipos de laboratorio). Compilar en 24.04
    # exigía GLIBC 2.38+ y rompía en 22.04.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install GTK / WebKit2GTK (backend pywebview en Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libgirepository-1.0-1 gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.1 libwebkit2gtk-4.1-0 || \
          sudo apt-get install -y \
            libgtk-3-0 libgirepository-1.0-1 gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.0 libwebkit2gtk-4.0-37
      - name: Generate icon assets
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python assets/generate_icon.py
      - name: Build AppImage (x86_64)
        env:
          ARCH_SUFFIX: x86_64
        run: bash build_linux.sh
      - name: Locate AppImage
        id: find_appimage
        run: |
          art=$(ls dist/*.AppImage 2>/dev/null | head -1)
          if [ -z "$art" ]; then art=$(ls dist/*.tar.gz 2>/dev/null | head -1); fi
          if [ -z "$art" ]; then
            echo "::error::No se generó AppImage ni tarball en dist/"
            ls -la dist/
            exit 1
          fi
          echo "path=$art" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage-x86_64
          path: ${{ steps.find_appimage.outputs.path }}

  build-linux-arm64:
    # Runner ARM64 nativo (gratis en repos públicos). PyInstaller no
    # cross-compila → aarch64 debe construirse en aarch64.
    # 22.04 (GLIBC 2.35), no 24.04: AppImage compatible hacia adelante → corre
    # en la Jetson (Ubuntu 22.04). Ver build-linux-x86_64.
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install GTK / WebKit2GTK (backend pywebview en Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libgirepository-1.0-1 gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.1 libwebkit2gtk-4.1-0 || \
          sudo apt-get install -y \
            libgtk-3-0 libgirepository-1.0-1 gir1.2-gtk-3.0 \
            gir1.2-webkit2-4.0 libwebkit2gtk-4.0-37
      - name: Generate icon assets
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python assets/generate_icon.py
      - name: Build AppImage (arm64)
        env:
          ARCH_SUFFIX: arm64
        run: bash build_linux.sh
      - name: Locate AppImage
        id: find_appimage
        run: |
          art=$(ls dist/*.AppImage 2>/dev/null | head -1)
          if [ -z "$art" ]; then art=$(ls dist/*.tar.gz 2>/dev/null | head -1); fi
          if [ -z "$art" ]; then
            echo "::error::No se generó AppImage ni tarball en dist/"
            ls -la dist/
            exit 1
          fi
          echo "path=$art" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage-arm64
          path: ${{ steps.find_appimage.outputs.path }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Generate icon assets
        run: |
          python -m pip install -r requirements.txt
          python assets/generate_icon.py
      - name: Build installer
        shell: pwsh
        run: ./build_windows.ps1
      - name: Locate installer
        id: find_exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\SYN-APSE-Conversor-LIF-Setup-*.exe | Select-Object -First 1
          "path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: ${{ steps.find_exe.outputs.path }}

  # Publica la Release en cuanto arm64 + windows están listos.
  # Crea el Release y adjunta esos dos artefactos.
  publish-fast:
    needs: [build-macos-arm64, build-windows, build-linux-x86_64, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-dmg-arm64
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: linux-appimage-x86_64
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: linux-appimage-arm64
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/*.tar.gz

  # Cuando termine el build Intel (si termina), adjunta su DMG al
  # MISMO Release. action-gh-release@v2 hace upsert por tag.
  publish-intel:
    needs: [publish-fast, build-macos-intel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-dmg-x86_64
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/*.dmg
